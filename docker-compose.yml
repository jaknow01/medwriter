services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medwriter_postgres
    environment:
      POSTGRES_DB: medwriter_db
      POSTGRES_USER: medwriter
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medwriter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medwriter_network

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: medwriter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medwriter_network

  # MCP Server
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medwriter_mcp
    command: python3 -m src.mcp_server.server
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - medwriter_network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medwriter_api
    command: python3 -m uvicorn src.api.main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://medwriter:password@postgres:5432/medwriter_db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medwriter_network
    restart: unless-stopped

  # Worker Service (3 async workers, scalable to 6)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medwriter_worker
    command: python3 -m src.worker
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://medwriter:password@postgres:5432/medwriter_db
      - REDIS_URL=redis://redis:6379/0
      - MCP_SERVER_URL=http://mcp_server:8000/mcp
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=INFO
      - NUM_WORKERS=3  # Number of concurrent async workers (max 6)
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp_server:
        condition: service_started
    networks:
      - medwriter_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  medwriter_network:
    driver: bridge
