services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medwriter_postgres
    environment:
      POSTGRES_DB: medwriter_db
      POSTGRES_USER: medwriter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medwriter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medwriter_network

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: medwriter_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medwriter_network

  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    container_name: medwriter_chromadb
    expose:
      - "8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medwriter_network
    restart: unless-stopped

  # MCP Server (real medwriter-server with PubMed tools)
  mcp_server:
    build:
      context: /home/kuba/medwriter-server
      dockerfile: Dockerfile
    container_name: medwriter_mcp
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENTREZ_EMAIL=${ENTREZ_EMAIL}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8000),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medwriter_network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medwriter_api
    command: python3 -m uvicorn src.api.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://medwriter:${POSTGRES_PASSWORD}@postgres:5432/medwriter_db
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medwriter_network
    restart: unless-stopped

  # Worker Service (3 async workers, scalable to 6)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medwriter_worker
    command: python3 -m src.worker
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://medwriter:${POSTGRES_PASSWORD}@postgres:5432/medwriter_db
      - REDIS_URL=redis://redis:6379/0
      - MCP_SERVER_URL=http://mcp_server:8000/mcp
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - LOG_LEVEL=INFO
      - NUM_WORKERS=3  # Number of concurrent async workers (max 6)
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp_server:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - medwriter_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  medwriter_network:
    driver: bridge
